replicaCount: 2

image:
  tag: "1.27-alpine"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

namespace: nginx-web

serverBlock: |
  server {
    listen 80;
    server_name _;
    location / {
      default_type text/plain;
      return 200 'Hello from NGINX via ArgoCD Helm!';
    }
    location /health {
      default_type text/plain;
      return 200 'OK';
    }
  }
