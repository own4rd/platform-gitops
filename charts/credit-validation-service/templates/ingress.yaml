apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: credit-validation-service
  namespace: {{ .Values.namespace }}
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: {{ .Values.ingress.path }}
        pathType: Prefix
        backend:
          service:
            name: credit-validation-service
            port:
              number: 80
